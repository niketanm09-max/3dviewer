<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Model Viewer</title>

<style>
body{
margin:0;
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

h2{
margin-top:20px;
}

#upload{
margin:20px;
padding:12px 18px;
background:#06b6d4;
border-radius:8px;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

#viewer{
width:100%;
height:600px;
}
</style>
</head>

<body>

<h2>Upload your 3D Model</h2>
<input type="file" id="upload" accept=".stl,.obj">

<div id="viewer"></div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.150.1/examples/jsm/controls/OrbitControls.js';
import { STLLoader } from 'https://unpkg.com/three@0.150.1/examples/jsm/loaders/STLLoader.js';
import { OBJLoader } from 'https://unpkg.com/three@0.150.1/examples/jsm/loaders/OBJLoader.js';

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

let camera = new THREE.PerspectiveCamera(60, window.innerWidth/600, 0.1, 10000);
camera.position.set(120,120,120);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,600);
document.getElementById('viewer').appendChild(renderer.domElement);

let controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const light1 = new THREE.HemisphereLight(0xffffff,0x444444,1.2);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff,1);
light2.position.set(1,1,1);
scene.add(light2);

let currentModel;

document.getElementById('upload').addEventListener('change',function(e){

if(currentModel) scene.remove(currentModel);

let file = e.target.files[0];
let url = URL.createObjectURL(file);

if(file.name.toLowerCase().endsWith('.stl')){
const loader = new STLLoader();
loader.load(url,function(geometry){
const material = new THREE.MeshStandardMaterial({color:0x22c55e,metalness:0.1,roughness:0.6});
const mesh = new THREE.Mesh(geometry,material);
centerObject(mesh);
scene.add(mesh);
currentModel=mesh;
});
}

if(file.name.toLowerCase().endsWith('.obj')){
const loader = new OBJLoader();
loader.load(url,function(obj){
centerObject(obj);
scene.add(obj);
currentModel=obj;
});
}

});

function centerObject(object){
const box = new THREE.Box3().setFromObject(object);
const center = box.getCenter(new THREE.Vector3());
const size = box.getSize(new THREE.Vector3()).length();

object.position.sub(center);

camera.near = size/100;
camera.far = size*100;
camera.updateProjectionMatrix();

camera.position.set(size,size,size);
camera.lookAt(0,0,0);
controls.update();
}

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
